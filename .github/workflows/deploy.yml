name: deploy

# Sync site/ to the origin bucket and invalidate CloudFront on every push to
# main that touches the site. The deploy role (see github-oidc/) is assumable
# from main only and can do nothing but sync + invalidate.
#
# The site is hand-written HTML from 1999-2003; there is no build step. There
# was no build step in 1999 either.

on:
  push:
    branches: [main]
    paths: [site/**, .github/workflows/deploy.yml]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: vars.AWS_DEPLOY_ROLE_ARN != ''
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-1

      - name: sync
        run: ./tools/deploy.sh s3://themiscpage.com

      - name: invalidate
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: >
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
