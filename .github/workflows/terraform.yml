name: terraform

# Validate + plan the infra/ root on PRs, pushes to main, and on demand. OIDC
# only — no long-lived AWS keys. The assumed role is plan-only (see github-oidc/).

on:
  pull_request:
    paths: [infra/**, github-oidc/**, .github/workflows/terraform.yml]
  push:
    branches: [main]
    paths: [infra/**, github-oidc/**, .github/workflows/terraform.yml]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: us-west-2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.7

      - name: fmt
        run: terraform fmt -check -recursive

      - name: init
        run: terraform init -input=false

      - name: validate
        run: terraform validate -no-color

      - name: plan
        # -lock=false: the plan role is read-only on state (no S3 lock write), and a
        # plan never mutates state, so skip the S3-native lock. Apply (which does lock)
        # runs elsewhere with write creds.
        run: terraform plan -input=false -no-color -lock=false
