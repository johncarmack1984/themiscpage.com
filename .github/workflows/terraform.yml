name: terraform

# Validate + plan this repo's root on PRs, pushes to main, and on demand. OIDC
# only — no long-lived AWS keys. The assumed role is plan-only (see github-oidc/).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: us-west-2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.7

      - name: fmt
        run: terraform fmt -check -recursive

      - name: init
        run: terraform init -input=false

      - name: validate
        run: terraform validate -no-color

      - name: plan
        # -lock=false: the plan role is read-only on state (no S3 lock write), and a
        # plan never mutates state, so skip the S3-native lock. Apply (which does lock)
        # runs elsewhere with write creds.
        run: terraform plan -input=false -no-color -lock=false
